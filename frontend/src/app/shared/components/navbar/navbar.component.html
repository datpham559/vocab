<nav class="navbar">
  <div class="container nav-inner">
    <a routerLink="/dashboard" class="logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">VocabDaily</span>
    </a>

    <ul class="nav-links">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
          Dashboard
        </a>
      </li>

      <!-- Học tập dropdown -->
      <li class="nav-dropdown">
        <span class="dropdown-trigger"
          [class.active]="isStudyActive">
          Học tập <span class="chevron">▾</span>
          <span class="review-badge" *ngIf="reviewCount() > 0">{{ reviewCount() }}</span>
        </span>
        <div class="dropdown-menu">
          <a routerLink="/study" routerLinkActive="active">
            📖 Học từ mới
          </a>
          <a routerLink="/review" routerLinkActive="active" class="dropdown-review">
            🔄 Ôn tập
            <span class="review-badge-sm" *ngIf="reviewCount() > 0">{{ reviewCount() }}</span>
          </a>
          <a routerLink="/favorites" routerLinkActive="active">
            ⭐ Yêu thích
          </a>
        </div>
      </li>

      <!-- Từ vựng dropdown -->
      <li class="nav-dropdown">
        <span class="dropdown-trigger" [class.active]="isWordsActive">
          Từ vựng <span class="chevron">▾</span>
        </span>
        <div class="dropdown-menu">
          <a routerLink="/words" routerLinkActive="active">
            📚 Kho từ vựng
          </a>
          <a routerLink="/topics" routerLinkActive="active">
            🗂️ Chủ đề
          </a>
        </div>
      </li>

      <li>
        <a routerLink="/exam" routerLinkActive="active">
          Kiểm tra
        </a>
      </li>
      <li>
        <a routerLink="/room" routerLinkActive="active">
          Phòng Quiz
        </a>
      </li>
      <li>
        <a routerLink="/leaderboard" routerLinkActive="active">
          Xếp hạng
        </a>
      </li>
      <li *ngIf="authService.isAdmin()">
        <a routerLink="/admin" routerLinkActive="active" class="nav-admin">
          Quản trị
        </a>
      </li>
    </ul>

    <div class="nav-user">
      <button
        class="btn-kbd"
        (click)="themeService.toggle()"
        [title]="themeService.isDark() ? 'Chuyển sang sáng' : 'Chuyển sang tối'"
        [class.active]="themeService.isDark()">
        {{ themeService.isDark() ? '☀️' : '🌙' }}
      </button>
      <button
        class="btn-kbd"
        (click)="kbdService.toggle()"
        [title]="kbdService.hintsEnabled() ? 'Ẩn gợi ý phím tắt' : 'Hiện gợi ý phím tắt'"
        [class.active]="kbdService.hintsEnabled()">
        ⌨️
      </button>
      <a routerLink="/profile" class="username" title="Hồ sơ cá nhân">{{ authService.currentUser()?.displayName }}</a>
      <button class="btn btn-sm btn-outline" (click)="logout()">Đăng xuất</button>
    </div>
  </div>
</nav>
