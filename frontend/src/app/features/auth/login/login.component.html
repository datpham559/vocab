<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📚</div>
      <h1>Chào mừng trở lại!</h1>
      <p>Đăng nhập để tiếp tục học từ vựng</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div *ngIf="error()" class="alert alert-error">{{ error() }}</div>

      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input
          id="username"
          type="text"
          class="form-control"
          [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          formControlName="username"
          placeholder="Nhập tên đăng nhập"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <div class="input-password-wrap">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            formControlName="password"
            placeholder="Nhập mật khẩu"
            autocomplete="current-password"
          />
          <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())" tabindex="-1">
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading()">
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>
    </form>

    <p class="auth-footer">
      Chưa có tài khoản?
      <a routerLink="/auth/register">Đăng ký ngay</a>
    </p>
  </div>
</div>
