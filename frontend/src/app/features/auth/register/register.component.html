<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📚</div>
      <h1>Tạo tài khoản</h1>
      <p>Bắt đầu hành trình học từ vựng của bạn</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div *ngIf="error()" class="alert alert-error">{{ error() }}</div>

      <div class="form-group">
        <label>Tên đăng nhập *</label>
        <input type="text" class="form-control"
          [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
          formControlName="username" placeholder="3-50 ký tự" autocomplete="username"/>
        <span class="error-msg" *ngIf="form.get('username')?.hasError('minlength') && form.get('username')?.touched">
          Tối thiểu 3 ký tự
        </span>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" class="form-control"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          formControlName="email" placeholder="example@email.com" autocomplete="email"/>
        <span class="error-msg" *ngIf="form.get('email')?.hasError('email') && form.get('email')?.touched">
          Email không hợp lệ
        </span>
      </div>

      <div class="form-group">
        <label>Mật khẩu *</label>
        <div class="input-password-wrap">
          <input [type]="showPassword() ? 'text' : 'password'" class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            formControlName="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password"/>
          <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())" tabindex="-1">
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched">
          Tối thiểu 6 ký tự
        </span>
      </div>

      <div class="form-group">
        <label>Tên hiển thị</label>
        <input type="text" class="form-control" formControlName="displayName" placeholder="Tên bạn muốn hiển thị"/>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading()">
        {{ loading() ? 'Đang tạo tài khoản...' : 'Đăng ký' }}
      </button>
    </form>

    <p class="auth-footer">
      Đã có tài khoản?
      <a routerLink="/auth/login">Đăng nhập</a>
    </p>
  </div>
</div>
